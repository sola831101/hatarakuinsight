name: Daily Article Pipeline

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:
    inputs:
      topic_id:
        description: '生成するトピックID'
        required: false
        type: string

jobs:
  generate-article:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm install -g tsx
      - name: Collect data
        env:
          ESTAT_APP_ID: ${{ secrets.ESTAT_APP_ID }}
        run: npx tsx scripts/collect-data.ts
        continue-on-error: true
      - name: Generate article
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          ID="${{ github.event.inputs.topic_id }}"
          if [ -n "$ID" ]; then npx tsx scripts/generate-article.ts $ID; else npx tsx scripts/generate-article.ts; fi
      - name: Commit draft
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/articles/ data/
          git diff --staged --quiet || git commit -m "draft: 自動生成記事 [$(date '+%Y-%m-%d')]"
          git push

  deploy:
    runs-on: ubuntu-latest
    needs: generate-article
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Build
        run: npm run build
      - name: Create Pages project if not exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages project create hatarakuinsight --production-branch=main 2>/dev/null || true
      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages deploy dist/ --project-name=hatarakuinsight --branch=main
