name: Daily Article Pipeline

on:
  schedule:
    # 毎朝03:00 JST (UTC 18:00 前日)
    - cron: '0 18 * * *'
  workflow_dispatch:
    inputs:
      topic_id:
        description: '生成するトピックID（空欄なら自動選択）'
        required: false
        type: string

jobs:
  generate-article:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install tsx
        run: npm install -g tsx

      # ステップ1: データ収集
      - name: Collect data
        env:
          ESTAT_APP_ID: ${{ secrets.ESTAT_APP_ID }}
          RESAS_API_KEY: ${{ secrets.RESAS_API_KEY }}
        run: npx tsx scripts/collect-data.ts
        continue-on-error: true  # データ収集失敗でも記事生成は続行

      # ステップ2: 記事生成 (draft: true で保存)
      - name: Generate article
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          TOPIC_ID="${{ github.event.inputs.topic_id }}"
          if [ -n "$TOPIC_ID" ]; then
            npx tsx scripts/generate-article.ts $TOPIC_ID
          else
            npx tsx scripts/generate-article.ts
          fi

      # ステップ3: 生成した記事をコミット (draft: true のまま)
      - name: Commit generated article
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/articles/ data/topics.json data/
          git diff --staged --quiet || git commit -m "draft: 自動生成記事を追加 [$(date '+%Y-%m-%d')]"
          git push

      # ステップ4: 完了通知
      - name: Notify completion
        if: success()
        run: |
          echo "✅ 記事生成完了: $(date '+%Y-%m-%d %H:%M JST')"
          echo "📝 draft記事が追加されました。GitHubで確認して公開してください。"
          echo ""
          echo "公開手順:"
          echo "  1. src/content/articles/ の最新ファイルを確認"
          echo "  2. draft: false に変更"
          echo "  3. git push → Cloudflare Pagesが自動デプロイ"
